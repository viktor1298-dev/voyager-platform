<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Light background -->
    <radialGradient id="bgGlowL" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#ede9fe" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="1"/>
    </radialGradient>

    <!-- Left arm: indigo tones for light bg -->
    <linearGradient id="leftMainL" x1="12" y1="8" x2="42" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="leftInnerL" x1="28" y1="10" x2="48" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b6b"/>
    </linearGradient>
    <linearGradient id="leftOuterL" x1="8" y1="8" x2="22" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Right arm: violet tones -->
    <linearGradient id="rightMainL" x1="88" y1="8" x2="58" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rightInnerL" x1="52" y1="10" x2="72" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d855f7"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="rightOuterL" x1="92" y1="8" x2="78" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="creaseL" x1="50" y1="10" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <circle cx="50" cy="50" r="50" fill="url(#bgGlowL)"/>

  <path d="M12 8 L20 8 L48 88 L40 88 Z" fill="url(#leftOuterL)" opacity="0.85"/>
  <path d="M20 8 L38 8 L50 88 L48 88 Z" fill="url(#leftMainL)"/>
  <path d="M38 8 L42 8 L50 88 L50 88 Z" fill="url(#leftInnerL)" opacity="0.9"/>
  <line x1="12" y1="8" x2="42" y2="8" stroke="#c7d2fe" stroke-width="1.2"/>

  <path d="M58 8 L62 8 L50 88 L50 88 Z" fill="url(#rightInnerL)" opacity="0.95"/>
  <path d="M62 8 L80 8 L52 88 L50 88 Z" fill="url(#rightMainL)"/>
  <path d="M80 8 L88 8 L60 88 L52 88 Z" fill="url(#rightOuterL)" opacity="0.85"/>
  <line x1="58" y1="8" x2="88" y2="8" stroke="#e9d5ff" stroke-width="1.2"/>

  <line x1="50" y1="10" x2="50" y2="88" stroke="url(#creaseL)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
