<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Left arm: darker indigo for light mode -->
    <linearGradient id="leftGradL" x1="4" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="leftShadowL" x1="4" y1="2" x2="14" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3730a3" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Right arm: richer violet for light mode -->
    <linearGradient id="rightGradL" x1="28" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </linearGradient>
    <linearGradient id="rightShadowL" x1="28" y1="2" x2="18" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b21a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="foldL" x1="16" y1="4" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ddd6fe" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <path d="M4 2 L13 2 L16 30 L10 30 Z" fill="url(#leftGradL)"/>
  <path d="M4 2 L7 2 L10 30 L4 28 Z" fill="url(#leftShadowL)"/>
  <path d="M28 2 L19 2 L16 30 L22 30 Z" fill="url(#rightGradL)"/>
  <path d="M28 2 L25 2 L22 30 L28 28 Z" fill="url(#rightShadowL)"/>
  <line x1="16" y1="4" x2="16" y2="30" stroke="url(#foldL)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="2" x2="13" y2="2" stroke="#c7d2fe" stroke-width="0.8" stroke-opacity="0.6"/>
  <line x1="19" y1="2" x2="28" y2="2" stroke="#e9d5ff" stroke-width="0.8" stroke-opacity="0.6"/>
</svg>
