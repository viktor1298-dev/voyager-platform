<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <!-- Left arm: indigo gradient -->
    <linearGradient id="leftGrad" x1="4" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Left arm shadow face -->
    <linearGradient id="leftShadow" x1="4" y1="2" x2="14" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338ca" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Right arm: violet gradient -->
    <linearGradient id="rightGrad" x1="28" y1="2" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="40%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Right arm shadow face -->
    <linearGradient id="rightShadow" x1="28" y1="2" x2="18" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#581c87" stop-opacity="0.95"/>
    </linearGradient>
    <!-- Fold highlight -->
    <linearGradient id="foldHighlight" x1="16" y1="4" x2="16" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Ambient glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Left arm — front face (lighter indigo) -->
  <path d="M4 2 L13 2 L16 30 L10 30 Z" fill="url(#leftGrad)" filter="url(#glow)"/>

  <!-- Left arm — side/shadow face (darker indigo, creates depth) -->
  <path d="M4 2 L7 2 L10 30 L4 28 Z" fill="url(#leftShadow)"/>

  <!-- Right arm — front face (violet with highlight) -->
  <path d="M28 2 L19 2 L16 30 L22 30 Z" fill="url(#rightGrad)" filter="url(#glow)"/>

  <!-- Right arm — side/shadow face (darker violet) -->
  <path d="M28 2 L25 2 L22 30 L28 28 Z" fill="url(#rightShadow)"/>

  <!-- Center fold line — bright highlight creating the origami crease -->
  <line x1="16" y1="4" x2="16" y2="30" stroke="url(#foldHighlight)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top fold edge highlights on each arm -->
  <line x1="4" y1="2" x2="13" y2="2" stroke="#a5b4fc" stroke-width="0.8" stroke-opacity="0.7"/>
  <line x1="19" y1="2" x2="28" y2="2" stroke="#f0abfc" stroke-width="0.8" stroke-opacity="0.7"/>
</svg>
