# Loki — monolithic mode with filesystem storage
# Deploy: helm install loki grafana/loki -n voyager -f loki-values.yaml
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h  # 7 days (set to 720h for 30 days in prod)
    allow_structured_metadata: true
    volume_enabled: true
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
    working_directory: /loki/compactor

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Disable MinIO — using filesystem, not S3
minio:
  enabled: false

# Zero out all non-monolithic replicas
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
