apiVersion: v1
kind: ConfigMap
metadata:
  name: voyager-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
data:
  HIDE_STACK_TRACES: "true"
  API_URL: {{ .Values.config.apiUrl | quote }}
  DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  ALLOWED_ORIGINS: {{ .Values.config.allowedOrigins | quote }}
  SENTRY_DSN: {{ .Values.config.sentryDsn | default "" | quote }}
  NEXT_PUBLIC_SENTRY_DSN: {{ .Values.config.sentryDsnWeb | default "" | quote }}
