apiVersion: apps/v1
kind: Deployment
metadata:
  name: voyager-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
    {{- include "voyager.selectorLabels.api" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "voyager.selectorLabels.api" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "voyager.selectorLabels.api" . | nindent 8 }}
    spec:
      serviceAccountName: voyager-api
      initContainers:
        - name: db-init
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until pg_isready -h postgres -p 5432 -U voyager; do
                sleep 2
              done
              echo "Running schema init..."
              PGPASSWORD=$(echo $DATABASE_URL | sed 's|.*://[^:]*:\([^@]*\)@.*|\1|') \
              psql "$DATABASE_URL" -f /sql/init.sql
              echo "DB init complete."
          envFrom:
            - configMapRef:
                name: voyager-config
          volumeMounts:
            - name: db-init-sql
              mountPath: /sql
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: NODE_ENV
              value: {{ default "development" .Values.env.NODE_ENV | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://jaeger:4318"
          envFrom:
            - configMapRef:
                name: voyager-config
            - secretRef:
                name: voyager-secret
          readinessProbe:
            httpGet:
              path: /system-health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /system-health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-init-sql
          configMap:
            name: voyager-db-init
