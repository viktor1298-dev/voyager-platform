apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.db.image.repository }}:{{ .Values.db.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: {{ .Values.db.port }}
          env:
            - name: POSTGRES_USER
              value: voyager
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voyager-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: voyager
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          {{- if .Values.db.persistence.enabled }}
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "voyager"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "voyager"]
            initialDelaySeconds: 15
            periodSeconds: 20
      {{- if .Values.db.persistence.enabled }}
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: voyager-db-data
      {{- end }}
