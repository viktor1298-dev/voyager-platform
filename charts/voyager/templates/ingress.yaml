{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voyager-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voyager-web
                port:
                  number: {{ .Values.web.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: voyager-api
                port:
                  number: {{ .Values.api.port }}
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: voyager-api
                port:
                  number: {{ .Values.api.port }}
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: voyager-api
                port:
                  number: {{ .Values.api.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: voyager-api
                port:
                  number: {{ .Values.api.port }}
          - path: /trpc
            pathType: Prefix
            backend:
              service:
                name: voyager-api
                port:
                  number: {{ .Values.api.port }}
    - host: jaeger.voyagerlabs.co
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
{{- end }}
