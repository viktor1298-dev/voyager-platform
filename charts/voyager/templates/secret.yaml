{{- $env := default (dict) .Values.env -}}
{{- $nodeEnv := default "development" (index $env "NODE_ENV") -}}
{{- $isLocal := eq $nodeEnv "local" -}}
apiVersion: v1
kind: Secret
metadata:
  name: voyager-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ required "dbPassword must be set" .Values.secret.dbPassword | b64enc }}
  DATABASE_URL: {{ required "config.databaseUrl must be set" .Values.config.databaseUrl | b64enc }}
  JWT_SECRET: {{ required "jwtSecret must be set" .Values.secret.jwtSecret | b64enc }}
  ADMIN_EMAIL: {{- if $isLocal }} {{ default "admin@voyager.local" .Values.secret.adminEmail | b64enc }} {{- else }} {{ required "secret.adminEmail must be set for non-local runtime bootstrap" .Values.secret.adminEmail | b64enc }} {{- end }}
  ADMIN_PASSWORD: {{- if $isLocal }} {{ default "admin123" .Values.secret.adminPassword | b64enc }} {{- else }} {{ required "secret.adminPassword must be set for non-local runtime bootstrap" .Values.secret.adminPassword | b64enc }} {{- end }}
  {{- if .Values.secret.aiKeysEncryptionKey }}
  AI_KEYS_ENCRYPTION_KEY: {{ .Values.secret.aiKeysEncryptionKey | b64enc }}
  {{- end }}
  {{- if .Values.secret.clusterCredEncryptionKey }}
  CLUSTER_CRED_ENCRYPTION_KEY: {{ .Values.secret.clusterCredEncryptionKey | b64enc }}
  {{- end }}
  REDIS_PASSWORD: {{ default "" .Values.secret.redisPassword | b64enc }}
