{{- $nodeEnv := default "development" .Values.env.NODE_ENV -}}
{{- $isProd := eq $nodeEnv "production" -}}
{{- $devBootstrapEnabled := and (default false .Values.devBootstrap.enabled) (not $isProd) -}}
apiVersion: v1
kind: Secret
metadata:
  name: voyager-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ required "dbPassword must be set" .Values.secret.dbPassword | b64enc }}
  DATABASE_URL: {{ .Values.config.databaseUrl | b64enc }}
  JWT_SECRET: {{ required "jwtSecret must be set" .Values.secret.jwtSecret | b64enc }}
  ADMIN_EMAIL: {{- if $devBootstrapEnabled }} {{ required "devBootstrap.adminEmail must be set when devBootstrap.enabled=true" .Values.devBootstrap.adminEmail | b64enc }} {{- else }} {{ required "secret.adminEmail must be set (or enable devBootstrap in non-production)" .Values.secret.adminEmail | b64enc }} {{- end }}
  ADMIN_PASSWORD: {{- if $devBootstrapEnabled }} {{ required "devBootstrap.adminPassword must be set when devBootstrap.enabled=true" .Values.devBootstrap.adminPassword | b64enc }} {{- else }} {{ required "secret.adminPassword must be set (or enable devBootstrap in non-production)" .Values.secret.adminPassword | b64enc }} {{- end }}
  ADMIN_NAME: {{- if $devBootstrapEnabled }} {{ default "Voyager Admin" .Values.devBootstrap.adminName | b64enc }} {{- else }} {{ default "Voyager Admin" .Values.secret.adminName | b64enc }} {{- end }}
