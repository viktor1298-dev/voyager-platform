apiVersion: v1
kind: Secret
metadata:
  name: voyager-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ .Values.secret.dbPassword }}
  DATABASE_URL: {{ .Values.config.databaseUrl | b64enc }}
  JWT_SECRET: {{ .Values.secret.jwtSecret | default "dev-jwt-secret" | b64enc }}
  ADMIN_PASSWORD: {{ .Values.secret.adminPassword | default "admin123" | b64enc }}
