apiVersion: v1
kind: Secret
metadata:
  name: voyager-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voyager.labels" . | nindent 4 }}
type: Opaque
data:
  DB_PASSWORD: {{ required "dbPassword must be set" .Values.secret.dbPassword | b64enc }}
  DATABASE_URL: {{ .Values.config.databaseUrl | b64enc }}
  JWT_SECRET: {{ required "jwtSecret must be set" .Values.secret.jwtSecret | b64enc }}
  ADMIN_PASSWORD: {{ required "adminPassword must be set" .Values.secret.adminPassword | b64enc }}
