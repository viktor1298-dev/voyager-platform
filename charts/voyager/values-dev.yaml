# Minikube development overrides
env:
  NODE_ENV: development

web:
  image:
    pullPolicy: Never

api:
  image:
    pullPolicy: Never

config:
  apiUrl: "http://voyager-api:4000"
  databaseUrl: "postgresql://voyager:voyager_dev@postgres:5432/voyager"
  redisUrl: "redis://redis:6379"

# Dev bootstrap credentials must be provided from local untracked file:
#   cp charts/voyager/values-local.example.yaml charts/voyager/values-local.yaml
#   helm template voyager ./charts/voyager -n voyager -f charts/voyager/values-dev.yaml -f charts/voyager/values-local.yaml
# Keep disabled here to avoid committing credentials.
devBootstrap:
  enabled: false
  adminEmail: ""
  adminPassword: ""
  adminName: "Voyager Admin"
  viewerEmail: ""
  viewerPassword: ""

secret:
  dbPassword: voyager_dev
  jwtSecret: dev-jwt-secret
  adminEmail: admin@voyager.local
  adminPassword: admin123
  # AES-256 dev key for BYOK encryption (dev only — not for production)
  aiKeysEncryptionKey: "1a67454d08771cb9c3270657401a721e9aff5630f83b8754842c82ccc2d1a3b4"
