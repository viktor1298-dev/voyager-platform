namespace: voyager

web:
  replicaCount: 1
  image:
    repository: voyager-web
    tag: v215
    pullPolicy: IfNotPresent
  port: 3000

api:
  replicaCount: 1
  image:
    repository: voyager-api
    tag: v215
    pullPolicy: IfNotPresent
  port: 4000

migrate:
  enabled: false  # Schema/init is handled by Helm sql/init.sql; API startup must not run migrate()
  image:
    repository: voyager-api-migrate
    tag: ""
  port: 4000

ingress:
  enabled: true
  className: nginx
  host: voyager-platform.voyagerlabs.co
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

env:
  NODE_ENV: development

config:
  apiUrl: "http://voyager-api:4000"
  redisUrl: "redis://redis:6379"
  databaseUrl: ""  # Required: set via --set or values override
  allowedOrigins: "http://localhost:3000,http://localhost:9000,http://100.90.102.90:9000,http://voyager-platform.voyagerlabs.co"
  sentryEnvironment: "production"
  sentryTracesSampleRate: "0.1"
  otelExporterOtlpEndpoint: ""
  logLevel: "info"

db:
  image:
    repository: timescale/timescaledb
    tag: "2.17.0-pg17"
  port: 5432
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

redis:
  image:
    repository: redis
    tag: "7-alpine"
  port: 6379
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

rbac:
  create: true

networkPolicy:
  enabled: false

pdb:
  enabled: false

secret:
  dbPassword: ""  # Override per environment
  jwtSecret: ""   # Override per environment
  adminEmail: ""  # Override per environment
  adminPassword: ""  # Override per environment
  redisPassword: ""  # Override per environment
