services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: voyager-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voyager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voyager_dev}
      POSTGRES_DB: ${POSTGRES_DB:-voyager_dev}

    command: ["-c", "listen_addresses=*"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./charts/voyager/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - voyager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voyager} -d ${POSTGRES_DB:-voyager_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voyager-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - voyager-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  voyager-net:
    driver: bridge
