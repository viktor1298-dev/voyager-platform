services:
  postgres:
    image: timescale/timescaledb:2.17.0-pg17
    container_name: voyager-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voyager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voyager_dev}
      POSTGRES_DB: ${POSTGRES_DB:-voyager_dev}

    command: ["-c", "listen_addresses=*"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./charts/voyager/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - voyager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voyager} -d ${POSTGRES_DB:-voyager_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voyager-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - voyager-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.4.2
    container_name: voyager-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - voyager-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.6.0
    container_name: voyager-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3200:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    networks:
      - voyager-net
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:

networks:
  voyager-net:
    driver: bridge
